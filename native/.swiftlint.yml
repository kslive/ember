# SwiftLint — default rule set. Thresholds are RELAXED only on the rules that fight
# this codebase (CoreAudio/DSP short names + localization/prompt data + a few large
# files); every other default rule is enforced and the code is clean against them.

excluded:
  - Tuist
  - Derived
  - .build
  - "**/Generated"

# Short, idiomatic names are pervasive in the CoreAudio/DSP code (au, dev, ch, n, s,
# tf, hw, kr…). Keep the casing checks, drop the min-length floor. `excluded` keeps the
# snake_case GitHub-JSON Decodable fields (they mirror the API payload verbatim).
identifier_name:
  min_length:
    warning: 1
    error: 0
  excluded:
    - id
    - tag_name
    - published_at
    - browser_download_url

# Localization values, summary prompts and explanatory comments are legitimately long.
line_length:
  warning: 400
  error: 600
  ignores_comments: true
  ignores_urls: true

# The localization table + the audio engine / app model are inherently large.
file_length:
  warning: 1500
  error: 2000
type_body_length:
  warning: 700
  error: 1000
function_body_length:
  warning: 120
  error: 200
cyclomatic_complexity:
  warning: 20
  error: 30
function_parameter_count:
  warning: 12
  error: 14
large_tuple:
  warning: 3
  error: 4
