<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* Ember port of the Sage editor shell: same editor.js (verbatim), Geist fonts
     and Ember dark tokens as the :root fallback (live values arrive via
     sageSetTheme). The link toolbar/slash entries are hidden — Ember has no
     note picker. */
  @font-face { font-family:'Geist'; src:url('Geist-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Geist'; src:url('Geist-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
  @font-face { font-family:'Geist'; src:url('Geist-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
  @font-face { font-family:'Geist'; src:url('Geist-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }
  @font-face { font-family:'Geist Mono'; src:url('GeistMono-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  :root {
    --bg:#0E0E10; --bg1:#161618; --bg2:#1C1C1F; --bg3:#1C1C1F;
    --bd:rgba(255,255,255,.07); --bd2:rgba(255,255,255,.13);
    --tx:#F5F5F4; --tx2:#A1A1A0; --tx3:#6B6B6A; --ac:#F97316; --acs:rgba(249,115,22,.13);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:transparent;
               font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif; color:var(--tx); }
  ::-webkit-scrollbar { width:0; height:0; }
  #editor { height:100vh; }

  /* CodeMirror 6 (source + Live Preview) */
  .cm-editor { height:100%; background:transparent; }
  .cm-editor.cm-focused { outline:none; }
  .cm-scroller { overflow-y:auto; overflow-x:hidden; scrollbar-gutter:stable;
    justify-content:flex-start !important; }
  /* Ember pane: FULL width (no Sage centered column), modest bottom padding
     (the compiled theme adds scroll-past-end space sized for a full window),
     mockup body scale (13.5/1.65). */
  .cm-content { caret-color:var(--ac); color:var(--tx);
    font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif !important;
    max-width:none !important; width:100% !important; margin:0 !important;
    padding:0 16px 48px !important;
    font-size:13.5px !important; line-height:1.65 !important; }
  .cm-line { padding:2px 0; }
  .cm-cursor { border-left-color:var(--ac); }
  .cm-selectionBackground, .cm-content ::selection { background:var(--acs) !important; }
  .cm-activeLine { background:transparent; }
  .cm-gutters { display:none; }

  /* Live Preview inline styles */
  .tok-strong { font-weight:700; color:var(--tx); }
  .tok-em { font-style:italic; }
  .tok-strike { text-decoration:line-through; color:var(--tx2); }
  .tok-code { font-family:'Geist Mono',ui-monospace,'SF Mono',monospace; font-size:.86em; background:var(--bg3);
    color:var(--ac); padding:2px 6px; border-radius:5px; }
  .tok-link { color:var(--ac); text-decoration:none; cursor:pointer; }
  .tok-link:hover { text-decoration:underline; text-underline-offset:2px; }
  .tok-url { color:var(--tx3); }
  .tok-hidden { display:none; }
  .tok-mark { color:var(--tx3); }

  /* block styles per line (Geist headings — Ember has no display face) */
  .ln-h1 { font-family:'Geist',sans-serif; font-size:20px !important; font-weight:700; letter-spacing:-.02em; line-height:1.25; padding-top:6px; }
  .ln-h2 { font-family:'Geist',sans-serif; font-size:16px !important; font-weight:600; letter-spacing:-.01em; line-height:1.3; padding-top:12px; }
  .ln-h3 { font-size:14.5px !important; font-weight:600; padding-top:8px; }
  .ln-h4 { font-size:13.5px !important; font-weight:600; padding-top:5px; }
  .ln-quote { border-left:3px solid var(--ac); padding-left:14px; color:var(--tx2); font-style:italic; }
  .ln-code { font-family:'Geist Mono',ui-monospace,'SF Mono',monospace; font-size:13px; background:var(--bg2); }
  .ln-code-first { border-top-left-radius:10px; border-top-right-radius:10px; padding-top:6px; }
  .ln-code-last { border-bottom-left-radius:10px; border-bottom-right-radius:10px; padding-bottom:6px; }
  .cm-code-block { background:var(--bg2); border:1px solid var(--bd); border-radius:10px; overflow:hidden; }
  .cm-code-label { font:600 11px 'Geist Mono',ui-monospace,'SF Mono',monospace; color:var(--tx3); letter-spacing:.04em;
    padding:6px 13px; background:var(--bg1); border-bottom:1px solid var(--bd); text-transform:lowercase; }
  .cm-code-content { font-family:'Geist Mono',ui-monospace,'SF Mono',monospace; font-size:13px; color:var(--tx);
    line-height:1.55; margin:0; padding:11px 13px; overflow-x:auto; white-space:pre; max-width:100%; }
  .ln-hr { color:var(--tx3); }

  /* task checkboxes */
  .cm-checkbox { display:inline-block; position:relative;
    width:16px; height:16px; margin-right:8px; vertical-align:middle; cursor:pointer;
    box-sizing:border-box;
    border:1.5px solid var(--bd2); border-radius:5px; transition:background .12s, border-color .12s; }
  .cm-checkbox:hover { border-color:var(--ac); }
  .cm-checkbox-on { background:var(--ac); border-color:var(--ac); }
  .cm-checkbox-on::after { content:"✓"; position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#0E0E10; font:700 10px -apple-system,sans-serif; line-height:1; }
  .cm-bullet { display:inline-block; width:1em; margin-right:4px; text-align:center;
    color:var(--ac); font-weight:700; vertical-align:baseline; }
  .cm-hr { height:0; border-top:1px solid var(--bd2); }

  .cm-bw { padding:4px 0 18px; max-width:100%; }
  /* ── Obsidian-style callouts ── */
  .cm-callout { padding:12px 15px 13px; border-radius:11px;
    border:1px solid var(--bd); border-left:3px solid var(--cg-ac, var(--ac));
    background:var(--cg-bg, var(--acs)); }
  .cm-callout-head { display:flex; align-items:center; gap:9px;
    font:600 13.5px 'Geist',-apple-system,sans-serif; color:var(--tx); }
  .cm-callout-ic { font-size:15px; line-height:1; filter:saturate(1.1); }
  .cm-callout-title { color:var(--cg-ac, var(--ac)); letter-spacing:-.01em; }
  .cm-callout-body { margin-top:7px; color:var(--tx); font-size:13.5px; line-height:1.62; }
  .cm-callout-body > div { margin:2px 0; }
  .cm-callout-sp { height:8px; }
  .cm-callout-ul { margin:4px 0; padding-left:20px; }
  .cm-callout-ul li { margin:2px 0; }
  .cm-cg-note     { --cg-ac:#5b9bd5; --cg-bg:rgba(91,155,213,.09); }
  .cm-cg-abstract { --cg-ac:#43c2b8; --cg-bg:rgba(67,194,184,.09); }
  /* tip follows the APP ACCENT (pushed live via sageSetTheme) — not a fixed hue */
  .cm-cg-tip      { --cg-ac:var(--ac); --cg-bg:var(--acs); }
  .cm-cg-success  { --cg-ac:#34D399; --cg-bg:rgba(52,211,153,.09); }
  .cm-cg-question { --cg-ac:#FBBF24; --cg-bg:rgba(251,191,36,.09); }
  .cm-cg-warning  { --cg-ac:#e0922f; --cg-bg:rgba(224,146,47,.10); }
  .cm-cg-fail     { --cg-ac:#e25563; --cg-bg:rgba(226,85,99,.09); }
  .cm-cg-danger   { --cg-ac:#EF4444; --cg-bg:rgba(239,68,68,.10); }
  .cm-cg-example  { --cg-ac:#a472e0; --cg-bg:rgba(164,114,224,.10); }
  .cm-cg-quote    { --cg-ac:#A1A1A0; --cg-bg:rgba(161,161,160,.08); }

  /* ── tables (Obsidian-like) ── */
  .cm-md-tablewrap { overflow-x:auto; max-width:100%; }
  .cm-md-table { border-collapse:collapse; width:auto; max-width:100%;
    font-size:13px; color:var(--tx); border:1px solid var(--bd2); border-radius:9px; overflow:hidden; }
  .cm-md-table th, .cm-md-table td { padding:7px 14px; border:1px solid var(--bd2); vertical-align:top; }
  .cm-md-table thead th { background:var(--bg2); font-weight:600; color:var(--tx); white-space:nowrap; }
  .cm-md-table tbody tr:nth-child(even) td { background:rgba(255,255,255,.018); }

  /* ── frontmatter → properties panel ── */
  .cm-frontmatter { padding:12px 15px; border:1px solid var(--bd);
    border-radius:11px; background:var(--bg1); }
  .cm-fm-cap { font:600 11px 'Geist',sans-serif; letter-spacing:.06em; text-transform:uppercase;
    color:var(--tx3); margin-bottom:8px; }
  .cm-fm-row { display:flex; gap:14px; padding:3px 0; font-size:13.5px; }
  .cm-fm-key { flex:0 0 110px; color:var(--tx2); }
  .cm-fm-val { color:var(--tx); }

  .sage-marksel { background:var(--acs); border-radius:3px; box-shadow:0 0 0 1px var(--acs); }

  /* Ember wants a PLAIN live editor: no selection toolbar, no slash menu.
     !important beats the inline display the JS sets when opening the popups. */
  .sage-seltoolbar { display:none !important; }
  .sage-slash { display:none !important; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="editor.js"></script>
</body>
</html>
